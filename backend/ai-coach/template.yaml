AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Coach Lambda — proxies to Amazon Bedrock Claude Haiku

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        AWS_REGION: !Ref AWS::Region
        BEDROCK_MODEL_ID: anthropic.claude-haiku-20240307-v1:0
        MAX_TOKENS: '512'

Resources:
  AiCoachFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ai-coach
      Handler: handler.handler
      CodeUri: .
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: !Sub 'arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-haiku-20240307-v1:0'
      Events:
        CoachPost:
          Type: HttpApi
          Properties:
            Path: /coach
            Method: POST
            ApiId: !Ref AiCoachApi

  AiCoachApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: ai-coach-api
      Auth:
        DefaultAuthorizer: AWS_IAM
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - x-api-key
        AllowMethods:
          - POST
          - OPTIONS

Outputs:
  AiCoachApiUrl:
    Description: AI Coach API endpoint URL
    Value: !Sub 'https://${AiCoachApi}.execute-api.${AWS::Region}.amazonaws.com/coach'
    Export:
      Name: AiCoachApiUrl

  AiCoachFunctionArn:
    Description: AI Coach Lambda function ARN
    Value: !GetAtt AiCoachFunction.Arn
