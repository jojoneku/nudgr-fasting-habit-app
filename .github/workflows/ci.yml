name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev, hotfix]

jobs:
  analyze_format:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env


      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check formatting
        run: dart format --output none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env


      - name: Run tests
        run: flutter test test/ --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
        continue-on-error: true

  promote_hotfix:
    name: Promote hotfix → main + dev
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/hotfix'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Open hotfix→main PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head hotfix \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --base main --head hotfix \
              --title "hotfix: promote hotfix → main" \
              --body "Automated hotfix promotion — CI passed on \`hotfix\`." \
              --repo "$GITHUB_REPOSITORY"
            existing=$(gh pr list --base main --head hotfix \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi
          gh pr merge "$existing" --auto --merge \
            --repo "$GITHUB_REPOSITORY"

      - name: Open hotfix→dev PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base dev --head hotfix \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --base dev --head hotfix \
              --title "hotfix: back-merge hotfix → dev" \
              --body "Keeping dev in sync with the hotfix." \
              --repo "$GITHUB_REPOSITORY"
            existing=$(gh pr list --base dev --head hotfix \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi
          gh pr merge "$existing" --auto --merge \
            --repo "$GITHUB_REPOSITORY"

  promote_to_main:
    name: Promote dev → main
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    # Only run when CI passes on a direct push to dev (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Open dev→main PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the PR if it doesn't already exist
          existing=$(gh pr list --base main --head dev \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')

          if [ -z "$existing" ]; then
            gh pr create \
              --base main --head dev \
              --title "chore: promote dev → main" \
              --body "Automated promotion — CI passed on \`dev\`." \
              --repo "$GITHUB_REPOSITORY"
            existing=$(gh pr list --base main --head dev \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi

          # Enable auto-merge (merges once all required checks on the PR pass)
          gh pr merge "$existing" --auto --merge \
            --repo "$GITHUB_REPOSITORY"

  release:
    name: Release — Build & Deploy APK
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Compute release metadata
        id: meta
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE '(BREAKING CHANGE|!:)'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMIT_MSG" | grep -qP '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER + 2100))
          APK_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/releases/app-release.apk"
          MANIFEST_URL="${{ secrets.SUPABASE_URL }}/storage/v1/object/public/releases/manifest.json"
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "manifest_url=$MANIFEST_URL" >> $GITHUB_OUTPUT
          echo "released_at=$RELEASED_AT" >> $GITHUB_OUTPUT
          printf 'release_notes<<EOF\n%s\nEOF\n' \
            "$(git log -1 --pretty=%B | head -c 300)" >> $GITHUB_OUTPUT

      - name: Bump pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.meta.outputs.new_version }}+${{ steps.meta.outputs.build_number }}/" pubspec.yaml

      - name: Set up keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/nudgr-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../app/nudgr-release.jks
          EOF

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ steps.meta.outputs.build_number }} \
            --build-name=${{ steps.meta.outputs.new_version }} \
            --dart-define=UPDATE_MANIFEST_URL=${{ steps.meta.outputs.manifest_url }}

      - name: Generate manifest.json
        run: |
          python3 -c "
          import json, sys
          print(json.dumps({
            'version': sys.argv[1],
            'build_number': int(sys.argv[2]),
            'apk_url': sys.argv[3],
            'release_notes': sys.argv[4],
            'released_at': sys.argv[5]
          }, indent=2))
          " \
            "${{ steps.meta.outputs.new_version }}" \
            "${{ steps.meta.outputs.build_number }}" \
            "${{ steps.meta.outputs.apk_url }}" \
            "${{ steps.meta.outputs.release_notes }}" \
            "${{ steps.meta.outputs.released_at }}" > manifest.json
          cat manifest.json

      - name: Upload manifest to Supabase
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/releases/manifest.json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @manifest.json

      - name: Upload APK to Supabase
        run: |
          curl -sf -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/releases/app-release.apk" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "x-upsert: true" \
            --data-binary @build/app/outputs/flutter-apk/app-release.apk

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.meta.outputs.new_version }}+${{ steps.meta.outputs.build_number }} [skip ci]"
          git push
