name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  analyze_format:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check formatting
        run: dart format --output none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test test/ --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
        continue-on-error: true

  promote_to_main:
    name: Promote dev → main
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    # Only run when CI passes on a direct push to dev (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Open dev→main PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the PR if it doesn't already exist
          existing=$(gh pr list --base main --head dev \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')

          if [ -z "$existing" ]; then
            gh pr create \
              --base main --head dev \
              --title "chore: promote dev → main" \
              --body "Automated promotion — CI passed on \`dev\`." \
              --repo "$GITHUB_REPOSITORY"
            existing=$(gh pr list --base main --head dev \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi

          # Enable auto-merge (merges once all required checks on the PR pass)
          gh pr merge "$existing" --auto --merge \
            --repo "$GITHUB_REPOSITORY"
