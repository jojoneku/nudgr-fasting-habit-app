name: CI

on:
  pull_request:
    branches: [main, dev, 'release-version-bump-*']
  push:
    branches: [main, dev, hotfix]

jobs:
  analyze_format:
    name: Analyze & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env


      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Check formatting
        run: dart format --output none --set-exit-if-changed .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env


      - name: Run tests
        run: flutter test test/ --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
        continue-on-error: true

  promote_hotfix:
    name: Promote hotfix → main + dev
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/hotfix'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Open hotfix→main PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          existing=$(gh pr list --base main --head hotfix \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --base main --head hotfix \
              --title "hotfix: promote hotfix → main" \
              --body "Automated hotfix promotion — CI passed on \`hotfix\`." \
              --repo "$GITHUB_REPOSITORY" || true
            existing=$(gh pr list --base main --head hotfix \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi

          # Wait for checks to complete before enabling auto-merge (if PR exists)
          if [ -n "$existing" ]; then
            for i in {1..60}; do
              status=$(gh pr view "$existing" --json statusCheckRollup --jq '.statusCheckRollup[] | select(.conclusion == null) | .name' 2>/dev/null | wc -l)
              if [ "$status" -eq 0 ]; then
                gh pr merge "$existing" --auto --merge --repo "$GITHUB_REPOSITORY" || true
                break
              fi
              sleep 2
            done
          fi

      - name: Open hotfix→dev PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          existing=$(gh pr list --base dev --head hotfix \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --base dev --head hotfix \
              --title "hotfix: back-merge hotfix → dev" \
              --body "Keeping dev in sync with the hotfix." \
              --repo "$GITHUB_REPOSITORY" || true
            existing=$(gh pr list --base dev --head hotfix \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi

          # Wait for checks to complete before enabling auto-merge (if PR exists)
          if [ -n "$existing" ]; then
            for i in {1..60}; do
              status=$(gh pr view "$existing" --json statusCheckRollup --jq '.statusCheckRollup[] | select(.conclusion == null) | .name' 2>/dev/null | wc -l)
              if [ "$status" -eq 0 ]; then
                gh pr merge "$existing" --auto --merge --repo "$GITHUB_REPOSITORY" || true
                break
              fi
              sleep 2
            done
          fi

  promote_to_main:
    name: Promote dev → main
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    # Only run when CI passes on a direct push to dev (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Open dev→main PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Create the PR if it doesn't already exist
          existing=$(gh pr list --base main --head dev \
            --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')

          if [ -z "$existing" ]; then
            gh pr create \
              --base main --head dev \
              --title "chore: promote dev → main" \
              --body "Automated promotion — CI passed on \`dev\`." \
              --repo "$GITHUB_REPOSITORY" || true
            existing=$(gh pr list --base main --head dev \
              --repo "$GITHUB_REPOSITORY" --json number --jq '.[0].number')
          fi

          # Wait for checks to complete before enabling auto-merge (if PR exists)
          if [ -n "$existing" ]; then
            for i in {1..60}; do
              status=$(gh pr view "$existing" --json statusCheckRollup --jq '.statusCheckRollup[] | select(.conclusion == null) | .name' 2>/dev/null | wc -l)
              if [ "$status" -eq 0 ]; then
                gh pr merge "$existing" --auto --merge --repo "$GITHUB_REPOSITORY" || true
                break
              fi
              sleep 2
            done
          fi

  release:
    name: Release — Build & Deploy APK
    runs-on: ubuntu-latest
    needs: [analyze_format, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Compute release metadata
        id: meta
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qE '(BREAKING CHANGE|!:)'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMIT_MSG" | grep -qP '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          BUILD_NUMBER=$((GITHUB_RUN_NUMBER + 2100))
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${NEW_VERSION}/app-release.apk"
          MANIFEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/manifest.json"
          RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "manifest_url=$MANIFEST_URL" >> $GITHUB_OUTPUT
          echo "released_at=$RELEASED_AT" >> $GITHUB_OUTPUT
          printf 'release_notes<<EOF\n%s\nEOF\n' \
            "$(git log -1 --pretty=%B | head -c 300)" >> $GITHUB_OUTPUT

      - name: Bump pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.meta.outputs.new_version }}+${{ steps.meta.outputs.build_number }}/" pubspec.yaml

      - name: Set up keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 --decode > android/app/nudgr-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../app/nudgr-release.jks
          EOF

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-number=${{ steps.meta.outputs.build_number }} \
            --build-name=${{ steps.meta.outputs.new_version }} \
            --dart-define=UPDATE_MANIFEST_URL=${{ steps.meta.outputs.manifest_url }}

      - name: Generate manifest.json
        run: |
          python3 -c "
          import json, sys
          print(json.dumps({
            'version': sys.argv[1],
            'build_number': int(sys.argv[2]),
            'apk_url': sys.argv[3],
            'release_notes': sys.argv[4],
            'released_at': sys.argv[5]
          }, indent=2))
          " \
            "${{ steps.meta.outputs.new_version }}" \
            "${{ steps.meta.outputs.build_number }}" \
            "${{ steps.meta.outputs.apk_url }}" \
            "${{ steps.meta.outputs.release_notes }}" \
            "${{ steps.meta.outputs.released_at }}" > manifest.json
          cat manifest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.meta.outputs.new_version }}" \
            --title "v${{ steps.meta.outputs.new_version }}" \
            --notes "${{ steps.meta.outputs.release_notes }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b release-version-bump-${{ steps.meta.outputs.new_version }}
          git add pubspec.yaml
          git commit -m "chore(release): bump version to ${{ steps.meta.outputs.new_version }}+${{ steps.meta.outputs.build_number }} [skip ci]"
          git push -u origin release-version-bump-${{ steps.meta.outputs.new_version }}

      - name: Open PR for version bump
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create -B main -H release-version-bump-${{ steps.meta.outputs.new_version }} \
            --title "chore(release): bump version to ${{ steps.meta.outputs.new_version }}" \
            --body "Automated version bump from release v${{ steps.meta.outputs.new_version }} — CI will ensure required status checks pass before merge." \
            --repo "$GITHUB_REPOSITORY"

          pr_number=$(gh pr list -B main -H release-version-bump-${{ steps.meta.outputs.new_version }} \
            --json number --jq '.[0].number' --repo "$GITHUB_REPOSITORY")

          gh pr merge "$pr_number" --auto --merge \
            --repo "$GITHUB_REPOSITORY"
