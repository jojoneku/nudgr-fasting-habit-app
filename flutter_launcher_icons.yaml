# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/img/nudgr_logo.png"

  android: "launcher_icon"
  image_path_android: "assets/img/nudgr_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#F5F7FB"
  adaptive_icon_foreground: "assets/img/nudgr_icon_nobg.png"

  ios: false
  image_path_ios: "assets/img/nudgr_logo.png"
  remove_alpha_channel_ios: true

  web:
    generate: true
    image_path: "assets/img/nudgr_logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

  windows:
    generate: true
    image_path: "assets/img/nudgr_logo.png"
    icon_size: 48 # min:48, max:256, default: 48

